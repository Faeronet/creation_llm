# LM training config
# Merge with data/10_recommended_training_config.yaml if present

# Model (must match tokenizer vocab_size)
model:
  vocab_size: 3072
  hidden_size: 768
  num_layers: 12
  num_heads: 12
  intermediate_size: 2048
  max_position_embeddings: 768
  dropout: 0.1
  tie_embeddings: true

# Training
batch_size: 4
epochs: 20
learning_rate: 1.0e-4
max_length: 512
checkpoint_every_steps: 500
checkpoint_every_epoch: true
resume: true
