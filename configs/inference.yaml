# Inference pipeline config
top_k: 5
max_new_tokens: 256
temperature: 0.8
use_fp16: true
answerability_threshold: 0.5
max_context_chars: 4000

# Post-check (context support) heuristics
# strict режим (по умолчанию, при средней уверенности answerability)
postcheck_min_overlap_ratio_strict: 0.3
postcheck_min_word_overlap_strict: 2

# relaxed режим (для high-confidence ответов)
postcheck_min_overlap_ratio_relaxed: 0.1
postcheck_min_word_overlap_relaxed: 1

# answerability prob, выше которой включаем relaxed-пороги (0.75 => prob 0.78+ уже relaxed)
answerability_high_confidence_threshold: 0.75
